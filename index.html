<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }
    h1 { font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 12px; color: #4ecca3; }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }
    #scoreboard span { color: #4ecca3; font-weight: bold; font-size: 1.3rem; }
    #game-container { position: relative; }
    canvas {
      border: 3px solid #4ecca3;
      border-radius: 4px;
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 26, 46, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
    }
    #overlay h2 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    #overlay p { font-size: 1rem; color: #aaa; margin-bottom: 20px; }
    #overlay button {
      padding: 10px 32px;
      font-size: 1rem;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    #overlay button:hover { background: #38b28e; }
    #controls {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🐍 SNAKE</h1>
  <div id="scoreboard">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  <div id="game-container">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>
  <div id="controls">Arrow keys / WASD to move &nbsp;|&nbsp; P to pause</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const startBtn = document.getElementById('start-btn');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const COLS = 20;
    const ROWS = 20;
    const CELL = canvas.width / COLS;
    const TICK_MS = 100;

    let snake, dir, nextDir, food, score, best, gameLoop, paused, running;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function rand(max) { return Math.floor(Math.random() * max); }

    function placeFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let pos;
      do { pos = { x: rand(COLS), y: rand(ROWS) }; } while (occupied.has(`${pos.x},${pos.y}`));
      return pos;
    }

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      paused = false;
      running = true;
      food = placeFood();
      scoreEl.textContent = 0;
      overlay.style.display = 'none';
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, TICK_MS);
    }

    function tick() {
      if (!running || paused) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        food = placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // Background
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1e2a4a';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          ctx.fillRect(c * CELL + CELL / 2 - 1, r * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        const green = Math.round(200 * ratio + 55);
        ctx.fillStyle = i === 0 ? '#4ecca3' : `rgb(0, ${green}, 120)`;
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 4 : 2);
        ctx.fill();
      });
    }

    function gameOver() {
      running = false;
      clearInterval(gameLoop);
      overlayTitle.textContent = 'Game Over';
      overlayMsg.textContent = `Score: ${score}`;
      startBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    function resume() {
      paused = false;
      overlay.style.display = 'none';
      startBtn.dataset.mode = 'start';
    }

    startBtn.addEventListener('click', () => {
      if (startBtn.dataset.mode === 'resume') resume();
      else init();
    });

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = { x: 0, y: 1 };  break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  break;
        case 'p': case 'P':
          if (!running) return;
          paused = !paused;
          if (paused) {
            overlayTitle.textContent = 'Paused';
            overlayMsg.textContent = 'Press P to resume';
            startBtn.textContent = 'Resume';
            startBtn.dataset.mode = 'resume';
            overlay.style.display = 'flex';
          } else {
            resume();
          }
          break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });
  </script>
</body>
</html>
